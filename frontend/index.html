<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,500&display=swap"
      rel="stylesheet"
    />
    <!-- Redirect unauthenticated users before React hydrates (avoids dashboard flash). -->
    <script>
      (function () {
        var path = window.location.pathname;
        var isPublic =
          path === '/login' ||
          path === '/signup' ||
          path === '/forgot-password' ||
          path.indexOf('/reset-password') === 0;
        if (!localStorage.getItem('token') && !isPublic) {
          window.location.replace('/login');
        }
      })();
    </script>
    <title>VeoGen — AI Image to Video</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
